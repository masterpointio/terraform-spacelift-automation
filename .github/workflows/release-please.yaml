name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  release-please:
    uses: masterpointio/.github/.github/workflows/release-please.yaml@5b6a1958f98df1c9bbe63b7920f6f7bb9bd68f87
    permissions:
      contents: write
      pull-requests: write
      issues: write
    secrets: inherit

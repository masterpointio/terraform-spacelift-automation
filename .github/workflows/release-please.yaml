name: Release Please

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  release-please:
    uses: masterpointio/.github/.github/workflows/release-please.yaml@chore/INT-1582/add_mp_workflows
    permissions:
      contents: write
      pull-requests: write
      issues: write
    secrets: inherit

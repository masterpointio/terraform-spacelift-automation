name: Trunk Upgrade

on:
  schedule:
    # On the first day of every month @ 8am
    - cron: 0 8 1 * *
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  trunk-upgrade:
    uses: masterpointio/.github/.github/workflows/trunk-upgrade.yaml@chore/INT-1582/add_mp_workflows
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
